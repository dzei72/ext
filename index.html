<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Chrome Extensions</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    background: #020617;
}

nav {
    text-align: center;
    margin: 10px;
}

nav a {
    color: #38bdf8;
    margin: 0 10px;
    text-decoration: none;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #020617;
    padding: 15px;
    border-radius: 12px;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.title {
    margin-top: 10px;
    font-size: 18px;
}

.title a {
    color: #38bdf8;
    text-decoration: none;
}

.button {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 12px;
    background: #38bdf8;
    color: black;
    border-radius: 6px;
    text-decoration: none;
}
</style>
</head>

<body>

<header>🚀 Chrome Extensions</header>

<nav>
    <a href="notes.html">Poznámky</a>
</nav>

<div class="container">

<!-- Measure It -->
<div class="card">
    <img src="https://via.placeholder.com/300x150?text=Measure+It">
    
    <div class="title">
        <a href="https://chromewebstore.google.com/detail/measure-it/nmcjbbgkamfkamnicjkchlhehnneadcj" target="_blank">
            Measure It
        </a>
    </div>

    <a class="button" href="https://chromewebstore.google.com/detail/measure-it/nmcjbbgkamfkamnicjkchlhehnneadcj" target="_blank">
        Otevřít ve Web Store
    </a>
</div>

<!-- Maze Offline -->
<div class="card">
    <img src="https://via.placeholder.com/300x150?text=Maze+Offline">
    
    <div class="title">
        <a href="https://chromewebstore.google.com/detail/maze-offline/ebkpcjbhoflpegahkjocpeagdjdeemem" target="_blank">
            Maze Offline
        </a>
    </div>

    <a class="button" href="https://chromewebstore.google.com/detail/maze-offline/ebkpcjbhoflpegahkjocpeagdjdeemem" target="_blank">
        Otevřít ve Web Store
    </a>
</div>

<!-- Speak It -->
<div class="card">
    <img src="https://via.placeholder.com/300x150?text=Speak+It">
    
    <div class="title">
        <a href="https://chromewebstore.google.com/detail/speak-it-text-to-speech-r/fbkabaeabkgadjmodpgfpkidnhceankd" target="_blank">
            Speak It: Text to Speech & Read Aloud
        </a>
    </div>

    <a class="button" href="https://chromewebstore.google.com/detail/speak-it-text-to-speech-r/fbkabaeabkgadjmodpgfpkidnhceankd" target="_blank">
        Otevřít ve Web Store
    </a>
</div>

</div>

</body>
</html>
