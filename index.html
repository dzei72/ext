<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Chrome Extensions by Dzei</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #020617, #0f172a);
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px 20px 10px; /* 👈 menší mezera dole */
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 5px;
}

.hero p {
    color: #94a3b8;
    font-size: 18px;
    margin-bottom: 10px; /* 👈 menší mezera */
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
    padding: 20px 40px 40px; /* 👈 menší top padding */
}

/* CARD */
.card {
    background: #020617;
    border-radius: 15px;
    padding: 20px;
    transition: 0.3s;
    border: 1px solid #1e293b;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #38bdf8;
}

.card img {
    width: 50%;
    height: auto;
    display: block;
    margin: 0 auto 15px;
    border-radius: 10px;
}

.title {
    font-size: 20px;
    text-align: center;
}

.button {
    display: block;
    margin: 15px auto 0;
    padding: 10px 14px;
    background: #38bdf8;
    color: black;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    width: fit-content;
}

/* NOTES SECTION */
.notes-section {
    text-align: center;
    margin: 20px 0 40px;
}

.notes-btn {
    display: inline-block;
    padding: 14px 22px;
    background: #38bdf8;
    color: black;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>🚀 My Chrome Extensions</h1>
    <p>Useful tools that improve your browsing experience</p>
</div>

<!-- EXTENSIONS -->
<div class="container">

<div class="card">
    <img src="measure.jpg">
    <div class="title">Measure It</div>
    <a class="button" href="https://chromewebstore.google.com/detail/measure-it/nmcjbbgkamfkamnicjkchlhehnneadcj" target="_blank">
        Open in Web Store
    </a>
</div>

<div class="card">
    <img src="maze.jpg">
    <div class="title">Maze Offline</div>
    <a class="button" href="https://chromewebstore.google.com/detail/maze-offline/ebkpcjbhoflpegahkjocpeagdjdeemem" target="_blank">
        Open in Web Store
    </a>
</div>

<div class="card">
    <img src="speaktestto.jpg">
    <div class="title">Speak It: Text to Speech & Read Aloud</div>
    <a class="button" href="https://chromewebstore.google.com/detail/speak-it-text-to-speech-r/fbkabaeabkgadjmodpgfpkidnhceankd" target="_blank">
        Open in Web Store
    </a>
</div>

</div>

<!-- NOTES (nově pod kartami) -->
<div class="notes-section">
    <a href="notes.html" class="notes-btn">📝 Open Notes</a>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Dzei – Chrome Extensions
</div>

</body>
</html>
