<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Moje Extensions</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    background: #020617;
}

nav {
    text-align: center;
    margin: 10px;
}

nav a {
    color: #38bdf8;
    margin: 0 10px;
    text-decoration: none;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #020617;
    padding: 15px;
    border-radius: 12px;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.button {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 12px;
    background: #38bdf8;
    color: black;
    border-radius: 6px;
    text-decoration: none;
}
</style>
</head>

<body>

<header>🚀 Moje Chrome Extensions</header>

<nav>
    <a href="notes.html">Poznámky</a>
</nav>

<div class="container">

<div class="card">
    <img src="https://via.placeholder.com/300x150">
    <h3>Allow Copy</h3>
    <a class="button" href="#">Stáhnout</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x150">
    <h3>Speak It</h3>
    <a class="button" href="#">Stáhnout</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x150">
    <h3>Maze Offline</h3>
    <a class="button" href="#">Stáhnout</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x150">
    <h3>Další Extension</h3>
    <a class="button" href="#">Stáhnout</a>
</div>

</div>

</body>
</html>
