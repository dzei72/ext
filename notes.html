<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes</title>

<!-- Firebase (správná verze) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #020617, #0f172a);
    color: white;
}

h1 {
    text-align: center;
    margin-top: 30px;
}

/* CONTAINER */
.container {
    padding: 30px;
    max-width: 900px;
    margin: 0 auto;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 400px;
    background: #020617;
    color: white;
    border: 1px solid #1e293b;
    padding: 15px;
    border-radius: 10px;
    font-size: 14px;
}

/* BUTTONS */
.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
}

/* BUTTON STYLE */
.btn {
    display: inline-flex;
    justify-content: center;
    align-items: center;

    width: 140px;
    height: 44px;

    background: #38bdf8;
    color: black;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;

    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 12px rgba(56,189,248,0.5);
}

/* STATUS */
.status {
    text-align: center;
    margin-top: 10px;
    color: #94a3b8;
}
</style>
</head>

<body>

<h1>📝 Notes</h1>

<div class="container">
    <textarea id="notes" placeholder="Write your notes here..."></textarea>
    
    <div class="buttons">
        <a href="index.html" class="btn">Back</a>
    </div>

    <div class="status" id="status"></div>
</div>

<script>
// 🔥 TVŮJ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBm6BLhe6WdeltxEaXqAvCDlvr_MYTf0c",
  authDomain: "notes-dzeiext.firebaseapp.com",
  projectId: "notes-dzeiext"
};

// init
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔑 ID z URL
const params = new URLSearchParams(window.location.search);
const noteId = params.get("id") || "default";

// elements
const textarea = document.getElementById("notes");
const status = document.getElementById("status");

// 🔄 realtime načítání
db.collection("notes").doc(noteId).onSnapshot((doc) => {
    if (doc.exists) {
        textarea.value = doc.data().text || "";
    }
});

// 💾 auto-save
textarea.addEventListener("input", () => {
    db.collection("notes").doc(noteId).set({
        text: textarea.value
    });
    showStatus("Saved ✓");
});

// status
function showStatus(text) {
    status.innerText = text;
    setTimeout(() => status.innerText = "", 1000);
}
</script>

</body>
</html>
