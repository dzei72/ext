<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reviews</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #020617, #0f172a);
    color: white;
}

h1 {
    text-align: center;
    margin-top: 40px;
}

.container {
    max-width: 800px;
    margin: 30px auto;
    padding: 0 20px;
}

.review {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

.stars {
    color: #facc15;
    margin-bottom: 10px;
}

.btn {
    display: block;
    width: 160px;
    height: 50px;
    line-height: 50px;
    text-align: center;
    margin: 40px auto;
    background: #38bdf8;
    color: black;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- ===================== -->
<!-- 🔥 PIŠ JEN TEXT SEM -->
<!-- odděluj prázdným řádkem -->
<!-- ===================== -->

<textarea id="data" style="display:none;">

Very simple and effective text-to-speech extension. I use it daily to read articles and it works perfectly. The Alt+S shortcut is super useful.

Great read aloud tool for webpages. Easy to use, lightweight, and the voice selection works really well. Exactly what I was looking for.

Clean and fast TTS extension with natural voices. The right-click option and keyboard shortcut make it very convenient to use.

</textarea>

<h1>⭐ Reviews</h1>

<div class="container" id="app"></div>

<a href="index.html" class="btn">Back</a>

<script>
const raw = document.getElementById("data").value.trim();

const reviews = raw.split(/\n\s*\n/);

const app = document.getElementById("app");

reviews.forEach(text => {
    const div = document.createElement("div");
    div.className = "review";

    div.innerHTML = `
        <div class="stars">★★★★★</div>
        <p>${text}</p>
    `;

    app.appendChild(div);
});
</script>

</body>
</html>
