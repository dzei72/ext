<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #020617, #0f172a);
    color: white;
}

h1 {
    text-align: center;
    margin-top: 30px;
}

/* CONTAINER */
.container {
    padding: 30px;
    max-width: 900px;
    margin: 0 auto;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 400px;
    background: #020617;
    color: white;
    border: 1px solid #1e293b;
    padding: 15px;
    border-radius: 10px;
    font-size: 14px;
}

/* BUTTONS */
.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
    flex-wrap: wrap;
}

/* BUTTON STYLE */
.btn {
    display: inline-flex;
    justify-content: center;
    align-items: center;

    width: 140px;
    height: 44px;

    background: #38bdf8;
    color: black;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;

    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 12px rgba(56,189,248,0.5);
}

.btn:active {
    transform: translateY(0);
}

/* STATUS */
.status {
    text-align: center;
    margin-top: 10px;
    color: #94a3b8;
}
</style>
</head>

<body>

<h1>📝 Notes</h1>

<div class="container">
    <textarea id="notes" placeholder="Write your notes here..."></textarea>
    
    <div class="buttons">
        <button class="btn" onclick="save()">Save</button>
        <button class="btn" onclick="exportNotes()">Export</button>
        <button class="btn" onclick="importNotes()">Import</button>
        <a href="index.html" class="btn">Back</a>
    </div>

    <div class="status" id="status"></div>
</div>

<input type="file" id="fileInput" style="display:none" />

<script>
const textarea = document.getElementById("notes");
const status = document.getElementById("status");
const fileInput = document.getElementById("fileInput");

// load
textarea.value = localStorage.getItem("notes") || "";

// save
function save() {
    localStorage.setItem("notes", textarea.value);
    showStatus("Saved ✓");
}

// auto-save
textarea.addEventListener("input", () => {
    localStorage.setItem("notes", textarea.value);
});

// ctrl + enter
textarea.addEventListener("keydown", (e) => {
    if (e.ctrlKey && e.key === "Enter") {
        save();
    }
});

// export
function exportNotes() {
    const blob = new Blob([textarea.value], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "notes.txt";
    link.click();
    showStatus("Exported ✓");
}

// import
function importNotes() {
    fileInput.click();
}

fileInput.addEventListener("change", function() {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        textarea.value = e.target.result;
        localStorage.setItem("notes", textarea.value);
        showStatus("Imported ✓");
    };
    reader.readAsText(file);
});

// status helper
function showStatus(text) {
    status.innerText = text;
    setTimeout(() => status.innerText = "", 1500);
}
</script>

</body>
</html>
